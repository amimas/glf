name: "CI - Build · Lint · Tests"

# Reusable workflow containing the actual CI jobs for pull request validation.
# This file is called by prs-entrypoint.yml and is intentionally separated so that
# event/routing logic stays in the entrypoint while the CI job set remains reusable.

# This reusable workflow does not receive secrets automatically from the PR event.
# The caller workflow (prs-entrypoint.yml) must explicitly pass secrets when calling it.

permissions:
  actions: read
  contents: read
  packages: read
  pull-requests: write
  security-events: write
  id-token: write

on:
  workflow_call:
    inputs:
      BRANCH_REF:
        type: string
        required: true
      FORK_PR:
        type: boolean
        required: false
      ENVIRONMENT:
        type: string
        required: false
        default: Integrate Pull Request

jobs:

  build:
    name: Build
    uses: ./.github/workflows/build.yml
    with:
      BRANCH_REF: ${{ inputs.BRANCH_REF }}

  static-analysis:
    name: Lint
    uses: ./.github/workflows/static-analysis.yml
    with:
      BRANCH_REF: ${{ inputs.BRANCH_REF }}

  tests:
    name: Tests
    uses: ./.github/workflows/tests-unit.yml
    with:
      BRANCH_REF: ${{ inputs.BRANCH_REF }}

  tests-acceptance:
    name: Acceptance Tests
    uses: ./.github/workflows/tests-acceptance.yml
    with:
      BRANCH_REF: ${{ inputs.BRANCH_REF }}
      environment: ${{ inputs.ENVIRONMENT }}
    secrets:
      GITLAB_EE_LICENSE: ${{ secrets.GITLAB_EE_LICENSE }}
      GITLAB_EE_ULTIMATE_LICENSE: ${{ secrets.GITLAB_EE_ULTIMATE_LICENSE }}

  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
        - language: actions
          build-mode: none
        - language: python
          build-mode: none
        - language: ruby
          build-mode: none
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        ref: ${{ inputs.BRANCH_REF }}

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}

    - name: Run manual build steps
      if: matrix.build-mode == 'manual'
      shell: bash
      run: |
        echo 'If you are using a "manual" build mode for one or more of the' \
          'languages you are analyzing, replace this with the commands to build' \
          'your code, for example:'
        echo '  make bootstrap'
        echo '  make release'
        exit 1

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
